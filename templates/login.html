<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Family Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .login-header .app-icon {
      font-size: 2.8rem;
      margin-bottom: .5rem;
    }
    .login-header h4 {
      color: #fff;
      font-weight: 700;
      margin: 0;
      font-size: 1.25rem;
    }
    .login-header small {
      color: rgba(255,255,255,0.65);
      font-size: .8rem;
    }
    .login-body {
      padding: 2rem;
    }
    .form-label {
      font-weight: 500;
      font-size: .875rem;
      color: #374151;
    }
    .form-control {
      border-radius: 10px;
      padding: .65rem 1rem;
      border: 1.5px solid #e5e7eb;
      font-size: .9rem;
    }
    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.15);
    }
    .input-group .form-control { border-right: none; }
    .input-group .btn-outline-secondary {
      border-radius: 0 10px 10px 0;
      border: 1.5px solid #e5e7eb;
      border-left: none;
      color: #9ca3af;
      background: #f9fafb;
    }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .7rem;
      font-weight: 600;
      font-size: .95rem;
      width: 100%;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .default-hint {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .8rem;
      color: #166534;
      margin-bottom: 1.25rem;
    }
    .default-hint strong { color: #14532d; }
    .alert-danger {
      border-radius: 10px;
      font-size: .875rem;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="app-icon">💰</div>
    <h4>Family Expense Tracker</h4>
    <small>Sign in to access your dashboard</small>
  </div>

  <div class="login-body">

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    {% if otp %}
    <!-- One-time password hint — only shown until admin changes credentials -->
    <div class="default-hint">
      <i class="bi bi-shield-lock-fill me-1"></i>
      <strong>First-time setup — one-time password:</strong><br>
      <strong>Username:</strong> admin<br>
      <strong>Password:</strong>
      <code style="font-size:.9rem;background:#dcfce7;padding:2px 6px;border-radius:4px;">{{ otp }}</code><br>
      <span style="font-size:.75rem;color:#15803d;">You will be asked to change this immediately after logging in.</span>
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label" for="username">
          <i class="bi bi-person-fill me-1"></i>Username
        </label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="admin  — or your WhatsApp number (+6591234567)"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="mb-4">
        <label class="form-label" for="password">
          <i class="bi bi-lock-fill me-1"></i>Password
        </label>
        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          >
          <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()" tabindex="-1">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.classList.replace('bi-eye', 'bi-eye-slash');
  } else {
    inp.type = 'password';
    ico.classList.replace('bi-eye-slash', 'bi-eye');
  }
}
</script>
</body>
</html>
