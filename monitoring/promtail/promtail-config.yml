server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs ──────────────────────────────────────────────────
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the "app" label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: app
      # Keep the full container name
      - source_labels: [__meta_docker_container_name]
        target_label: container
      # Add Docker image label
      - source_labels: [__meta_docker_container_image]
        target_label: image

    pipeline_stages:
      # Parse timestamps from Flask log lines like: [2024-01-15 10:30:00] INFO ...
      - regex:
          expression: '^\[(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]'
      - labels:
          timestamp:
      # Classify log level
      - regex:
          expression: '(?i)(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL)'
      - labels:
          level:
